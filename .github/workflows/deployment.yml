name: Build and Push to AWS ECR

on:
  push:
    branches:
      - dev

permissions:
  id-token: write # Required for requesting the JWT from GitHub OIDC provider
  contents: read  # Required for checkout

jobs:
  build-and-push:
    name: Build, Tag, and Push Docker Image
    runs-on: ubuntu-latest
    # Explicitly using the "dev" environment for environments secrets/variables
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role-session-name: github-actions-ecr-push
          aws-region: ${{ secrets.AWS_REGION || vars.AWS_REGION || 'ap-south-1' }} # Update region if needed

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract commit hash
        id: vars
        shell: bash
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          # Using GitHub Actions cache to speed up builds in the pipeline
          cache-from: type=gha
          cache-to: type=gha,mode=max
